<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Summer Focus Calendar</title>
    <!-- Typography Upgrade: Importing Inter from Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* True Dark Mode Colors */
            --bg-color: #121212;
            --text-main: #E0E0E0;
            --text-muted: #9E9E9E;
            
            /* Card Architecture Colors */
            --surface: #1E1E1E;
            --surface-hover: #2A2A2A;
            --border-color: #333333;
            
            /* Custom UI Accent */
            --accent: #8B5CF6; /* Vibrant purple */
            
            /* Tag Styling Colors */
            --tag-high-priority: rgba(239, 68, 68, 0.15);
            --tag-high-priority-text: #FCA5A5;
            --tag-default: rgba(255, 255, 255, 0.1);
            --tag-default-text: #E0E0E0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
            background: var(--bg-color);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin: 0 0 1rem 0;
            letter-spacing: -0.02em;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
        }

        /* Custom UI Controls: Navigation Buttons */
        button {
            background-color: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background-color: var(--surface-hover);
            transform: translateY(-2px);
            border-color: #555;
        }

        #current-week-label {
            font-size: 1.1rem;
            font-weight: 600;
            min-width: 220px;
        }

        .calendar-container {
            display: flex;
            padding: 2rem;
            gap: 1.5rem;
            overflow-x: auto;
            flex: 1;
            align-items: flex-start;
        }

        .day-column {
            flex: 1;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .day-header {
            text-align: center;
            padding: 1rem;
            background: var(--surface);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .day-header.is-today {
            border-color: var(--accent);
            box-shadow: 0 0 0 1px var(--accent);
        }

        .day-name {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .day-date {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        .wednesday-flag {
            margin-top: 0.75rem;
            font-size: 0.75rem;
            font-weight: 600;
            background: var(--tag-high-priority);
            color: var(--tag-high-priority-text);
            padding: 0.35rem 0.75rem;
            border-radius: 9999px; /* Pill shape */
            display: inline-block;
        }

        /* Card Architecture */
        .task-card {
            background-color: var(--surface);
            border-radius: 12px; /* Smooth rounded corners */
            padding: 1.25rem; /* Ample padding */
            cursor: pointer;
            border: 1px solid var(--border-color);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15); /* Subtle shadow */
            transition: all 0.2s ease;
            display: grid;
            grid-template-columns: 24px 1fr;
            gap: 16px;
            align-items: start;
        }

        /* Hover State */
        .task-card:hover {
            background-color: var(--surface-hover); /* Lightens background */
            transform: translateY(-2px); /* Elevates */
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
        }

        .task-card.checked {
            opacity: 0.6;
        }
        
        .task-card.checked .task-title {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        /* Custom UI Controls: Checkbox */
        .checkbox {
            width: 24px;
            height: 24px;
            border: 2px solid #555;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            margin-top: 2px;
        }

        .task-card.checked .checkbox {
            background-color: var(--accent); /* Vibrant purple */
            border-color: var(--accent);
        }

        /* Checkmark icon via CSS */
        .task-card.checked .checkbox::after {
            content: '';
            width: 6px;
            height: 12px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
            margin-bottom: 2px;
        }

        .task-content {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .task-title {
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.4;
            color: var(--text-main);
        }

        .task-meta {
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 0.75rem;
            flex-wrap: wrap;
        }

        /* Muted/smaller timestamps */
        .task-duration {
            font-size: 0.8rem;
            color: var(--text-muted);
            font-weight: 500;
        }

        /* Tag Styling */
        .task-tag {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.25rem 0.6rem;
            border-radius: 9999px; /* Heavy border-radius pill */
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .tag-high-priority {
            background-color: var(--tag-high-priority);
            color: var(--tag-high-priority-text);
        }

        .tag-default {
            background-color: var(--tag-default);
            color: var(--tag-default-text);
        }

        .catch-up-list {
            margin-top: 0.25rem;
            font-size: 0.85rem;
            color: var(--text-muted);
            list-style-type: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }
        
        .catch-up-list li {
            position: relative;
            padding-left: 14px;
        }

        .catch-up-list li::before {
            content: '•';
            position: absolute;
            left: 0;
            color: #555;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
    </style>
</head>
<body>

    <header>
        <h1>Summer Focus 2026</h1>
        <div class="controls">
            <button id="prev-week">← Prev Week</button>
            <div id="current-week-label">July 1 - July 7</div>
            <button id="next-week">Next Week →</button>
            <button id="today-btn">Today</button>
        </div>
    </header>

    <div class="calendar-container" id="calendar">
        <!-- Columns rendered by JS -->
    </div>

    <script>
        const START_DATE = new Date('2026-07-01T00:00:00');
        const END_DATE = new Date('2026-09-01T00:00:00');
        
        let currentViewDate = new Date();
        if (currentViewDate < START_DATE || currentViewDate > END_DATE) {
            currentViewDate = new Date(START_DATE);
        }

        function getMonday(d) {
            const date = new Date(d);
            const day = date.getDay();
            const diff = date.getDate() - day + (day === 0 ? -6 : 1);
            return new Date(date.setDate(diff));
        }

        function formatDateKey(date) {
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
        }

        function toggleTask(dateKey, taskId, cardElement) {
            const state = JSON.parse(localStorage.getItem('focusApp_tasks') || '{}');
            const isChecked = state[`${dateKey}_${taskId}`];
            
            if (isChecked) {
                delete state[`${dateKey}_${taskId}`];
                cardElement.classList.remove('checked');
            } else {
                state[`${dateKey}_${taskId}`] = true;
                cardElement.classList.add('checked');
            }
            
            localStorage.setItem('focusApp_tasks', JSON.stringify(state));
            
            // Re-render to update the weekend catch-up block visually
            renderWeek();
        }

        function isTaskChecked(dateKey, taskId) {
            const state = JSON.parse(localStorage.getItem('focusApp_tasks') || '{}');
            return !!state[`${dateKey}_${taskId}`];
        }

        function getFDEPhase(date) {
            const time = date.getTime();
            const d = (str) => new Date(str + 'T00:00:00').getTime();
            const end = (str) => new Date(str + 'T23:59:59').getTime();
            
            if (time >= d('2026-07-01') && time <= end('2026-07-07')) return "Phase 1: System Design";
            if (time >= d('2026-07-08') && time <= end('2026-07-12')) return "Phase 2: Linux";
            if (time >= d('2026-07-13') && time <= end('2026-07-18')) return "Phase 3: DSA";
            if (time >= d('2026-07-19') && time <= end('2026-07-25')) return "Phase 4: DevOps";
            if (time >= d('2026-07-26') && time <= end('2026-08-01')) return "Phase 5: Backend";
            if (time >= d('2026-08-02') && time <= end('2026-08-07')) return "Phase 6: Frontend";
            if (time >= d('2026-08-08') && time <= end('2026-08-12')) return "Phase 7: Prompt Engineering";
            if (time >= d('2026-08-13') && time <= end('2026-08-19')) return "Phase 8: FDE Main";
            return null;
        }

        function getTasksForDate(date) {
            const dateStr = formatDateKey(date);
            const day = date.getDay();
            const isWeekend = day === 0 || day === 6;
            
            let tasks = [];

            if (isWeekend) {
                const monday = getMonday(date);
                let missedTasks = [];
                for(let i=0; i<5; i++) {
                    const d = new Date(monday);
                    d.setDate(monday.getDate() + i);
                    if(d >= START_DATE && d <= END_DATE) {
                        const dKey = formatDateKey(d);
                        const weekdayTasks = getBaseTasks(d, formatDateKey(d));
                        weekdayTasks.forEach((t, idx) => {
                            if(!isTaskChecked(dKey, idx)) {
                                missedTasks.push(`${t.name} (${d.toLocaleDateString('en-US', {weekday:'short'})})`);
                            }
                        });
                    }
                }

                tasks.push({ 
                    name: "Catch-up & Optimization", 
                    duration: "Flexible", 
                    category: "management", 
                    tag: "Weekend",
                    missed: missedTasks
                });
                
                tasks.push({ name: "Content Creation (Light)", duration: "1 hour", category: "earnings", tag: "" });
                tasks.push({ name: "Health Baseline", duration: "45 minutes", category: "lifestyle", tag: "" });
                
                return tasks;
            }

            return getBaseTasks(date, dateStr);
        }

        function getBaseTasks(date, dateStr) {
            const isOverrideDate = ['2026-07-03', '2026-07-06', '2026-07-07', '2026-07-08'].includes(dateStr);
            const tasks = [];

            tasks.push({ name: "Content Creation", duration: "2 hours", category: "earnings", tag: "Priority 1" });
            tasks.push({ name: "Trend Learning", duration: "1 hour", category: "technical", tag: "" });
            tasks.push({ name: "ASIF Ventures Prep & Ops", duration: "1 hour", category: "management", tag: "" });
            tasks.push({ name: "Remote Job Applications", duration: isOverrideDate ? "30 mins" : "1 hour", category: "job", tag: "High Priority" });
            tasks.push({ name: "Onsite Job Applications", duration: isOverrideDate ? "30 mins" : "1 hour", category: "job", tag: "" });
            tasks.push({ name: "Health Baseline", duration: "45 minutes", category: "lifestyle", tag: "" });

            const fdePhase = getFDEPhase(date);
            if (fdePhase) {
                tasks.push({ 
                    name: `Deep Work: ${fdePhase} (13 topics)`, 
                    duration: isOverrideDate ? "2 Hours" : "4 Hours", 
                    category: "technical", 
                    tag: "FDE Roadmap" 
                });
            }

            return tasks;
        }

        function renderWeek() {
            const container = document.getElementById('calendar');
            container.innerHTML = '';
            
            const monday = getMonday(currentViewDate);
            const sunday = new Date(monday);
            sunday.setDate(monday.getDate() + 6);
            
            const options = { month: 'short', day: 'numeric' };
            document.getElementById('current-week-label').innerText = 
                `${monday.toLocaleDateString('en-US', options)} - ${sunday.toLocaleDateString('en-US', options)}`;

            const todayStr = formatDateKey(new Date());

            for (let i = 0; i < 7; i++) {
                const colDate = new Date(monday);
                colDate.setDate(monday.getDate() + i);
                const dateKey = formatDateKey(colDate);
                const isToday = dateKey === todayStr;
                
                const col = document.createElement('div');
                col.className = 'day-column';
                
                const isWednesday = colDate.getDay() === 3;
                const wednesdayFlag = isWednesday ? `<div class="wednesday-flag">Morning Block Only - Afternoon Deadlines</div>` : '';
                
                let headerHTML = `
                    <div class="day-header ${isToday ? 'is-today' : ''}">
                        <div class="day-name">${colDate.toLocaleDateString('en-US', { weekday: 'long' })}</div>
                        <div class="day-date">${colDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
                        ${wednesdayFlag}
                    </div>
                `;
                col.innerHTML = headerHTML;

                if (colDate >= START_DATE && colDate <= END_DATE) {
                    const tasks = getTasksForDate(colDate);
                    tasks.forEach((task, index) => {
                        const isChecked = isTaskChecked(dateKey, index);
                        const card = document.createElement('div');
                        card.className = `task-card ${isChecked ? 'checked' : ''}`;
                        card.onclick = () => toggleTask(dateKey, index, card);

                        let missedHtml = '';
                        if (task.missed && task.missed.length > 0) {
                            missedHtml = `<ul class="catch-up-list">${task.missed.map(m => `<li>${m}</li>`).join('')}</ul>`;
                        } else if (task.missed && task.missed.length === 0) {
                            missedHtml = `<div style="margin-top: 0.5rem; font-size: 0.8rem; color: #10b981;">No missed tasks! 🎉</div>`;
                        }
                        
                        // Tag class determination
                        const tagClass = (task.tag && task.tag.toLowerCase().includes('priority')) ? 'tag-high-priority' : 'tag-default';

                        card.innerHTML = `
                            <div class="checkbox"></div>
                            <div class="task-content">
                                <div class="task-title">${task.name}</div>
                                ${missedHtml}
                                <div class="task-meta">
                                    <span class="task-duration">⏱ ${task.duration}</span>
                                    ${task.tag ? `<span class="task-tag ${tagClass}">${task.tag}</span>` : ''}
                                </div>
                            </div>
                        `;
                        col.appendChild(card);
                    });
                } else {
                    const outOfBounds = document.createElement('div');
                    outOfBounds.style.textAlign = 'center';
                    outOfBounds.style.color = 'var(--text-muted)';
                    outOfBounds.style.fontSize = '0.9rem';
                    outOfBounds.style.marginTop = '2rem';
                    outOfBounds.innerText = "Outside Summer Focus Period";
                    col.appendChild(outOfBounds);
                }

                container.appendChild(col);
            }
        }

        document.getElementById('prev-week').addEventListener('click', () => {
            currentViewDate.setDate(currentViewDate.getDate() - 7);
            renderWeek();
        });

        document.getElementById('next-week').addEventListener('click', () => {
            currentViewDate.setDate(currentViewDate.getDate() + 7);
            renderWeek();
        });

        document.getElementById('today-btn').addEventListener('click', () => {
            currentViewDate = new Date();
            if (currentViewDate < START_DATE || currentViewDate > END_DATE) {
                currentViewDate = new Date(START_DATE);
            }
            renderWeek();
        });

        renderWeek();
    </script>
</body>
</html>
